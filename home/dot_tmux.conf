# ~/.tmux.conf — managed by chezmoi (source: home/dot_tmux.conf)
# Minimal, agent-survival oriented: tmux is the layer that keeps long-lived agent
# sessions alive across VS Code server replacement / window reloads / OOM.

# Big scrollback — agent transcripts are long; this replaces VS Code's
# persistentSessionScrollback as the source of truth inside tmux.
set -g history-limit 50000

# Let modern escape sequences (VS Code shell integration, OSC 52 clipboard,
# image protocols) pass through to the outer terminal.
set -g allow-passthrough on

# Mouse: scroll, select panes/windows.
set -g mouse on

# Proper terminfo + truecolor through tmux.
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# Keep window numbers gapless when one closes.
set -g renumber-windows on

# Don't wait on ESC (vim/TUI responsiveness inside tmux).
set -s escape-time 10
